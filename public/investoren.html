<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NANIL Pulse - Investoren</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
    <style>.lang-btn.active { background: rgba(212, 175, 55, 0.25); color: #D4AF37; border-color: rgba(212, 175, 55, 0.5); }</style>
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column; background: transparent;">

    <!-- Header -->
    <header>
        <div class="container header-inner">
            <a href="vorpage.html" class="logo">
                <img src="assets/logo.jpg" alt="Logo" id="logo-img" style="display:none;">
                <span class="text-gradient-gold" id="logo-text">NANIL Pulse</span>
            </a>
            <div class="nav-wrapper">
                <nav class="main-menu">
                    <ul>
                        <li><a href="vorpage.html" id="nav-back" class="btn-back-home" data-i18n="nav-back">Zurück zur Startseite</a></li>
                    </ul>
                </nav>
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="de">DE</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="tr">TR</button>
                </div>
            </div>
        </div>
    </header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 120px 20px;">
        <div class="container" style="max-width: 600px; width: 100%;">
            <div
                style="background: var(--bg-card); border-radius: 20px; padding: 40px; box-shadow: var(--shadow-xl); text-align: center; border: 1px solid rgba(212, 175, 55, 0.2);">
                <!-- Pitch Deck CTA -->
                <a href="pitch.html" style="display:block; margin-bottom:30px; padding:16px 24px; background:linear-gradient(135deg,#009e88,#00c4aa,#33d4be); border-radius:14px; color:#0a0a0c; font-weight:700; font-size:1rem; letter-spacing:0.5px; text-decoration:none; transition:all 0.3s; box-shadow:0 6px 20px rgba(0,196,170,0.3);">
                    📊 Pitch Deck jetzt ansehen →
                </a>

                <!-- Unified section header for script targeting -->
                <div class="section-header">
                    <h1 style="color: white; font-size: 2.5rem; margin-bottom: 10px;">Investoren Zugang</h1>
                    <p style="color: var(--text-muted); margin-bottom: 30px;">
                        Detaillierte Unterlagen und Finanzplanung anfordern. Wir senden Ihnen alles nach Prüfung per E-Mail zu.
                    </p>
                </div>

                <form class="contact-form" id="investoren_anfrage" action="https://formspree.io/f/xreezyov"
                    method="POST">
                    <input type="hidden" name="_subject" value="Neue Investoren Anfrage">

                    <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                        <label id="label-name"
                            style="color: var(--gold-primary); font-weight: 600; display: block; margin-bottom: 8px;" data-i18n="label-name-short">Name</label>
                        <input type="text" name="name" placeholder="Name" required
                            style="width: 100%; border-radius: 10px;">
                    </div>

                    <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                        <label id="label-company"
                            style="color: var(--gold-primary); font-weight: 600; display: block; margin-bottom: 8px;">Firma
                            / VC</label>
                        <input type="text" name="company" placeholder="Firma" style="width: 100%; border-radius: 10px;">
                    </div>

                    <div class="form-group" style="margin-bottom: 30px; text-align: left;">
                        <label id="label-email"
                            style="color: var(--gold-primary); font-weight: 600; display: block; margin-bottom: 8px;" data-i18n="label-email">E-Mail
                            Adresse</label>
                        <input type="email" name="email" placeholder="Email" required
                            style="width: 100%; border-radius: 10px;">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Unterlagen
                        anfordern</button>
                    <input type="hidden" name="subject" value="Investoren Anfrage">
                </form>
            </div>
        </div>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid rgba(255,255,255,0.05);">
        <div class="container" style="text-align: center;">
            <div style="display:flex;gap:20px;justify-content:center;margin-bottom:16px;"><a href="https://www.instagram.com/nanil_pulse" target="_blank" rel="noopener" style="color:#c8cdd5;font-size:22px;transition:color 0.3s;" title="Instagram"><i class="fab fa-instagram"></i></a><a href="https://www.linkedin.com/in/nazan-dalkic-4ab00a166" target="_blank" rel="noopener" style="color:#c8cdd5;font-size:22px;transition:color 0.3s;" title="LinkedIn"><i class="fab fa-linkedin"></i></a></div>
            <p id="footer-copy" style="color: #a0a8b4; font-size: 0.9rem;" data-i18n="footer-copy">&copy; 2026 NANIL Pulse - Alle Rechte
                vorbehalten.</p>
        </div>
    </footer>

    <script src="bg-animation.js" defer></script>
    <script src="script.js"></script>
</body>

</html>
