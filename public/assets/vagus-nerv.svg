<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080a10"/>
      <stop offset="100%" stop-color="#0c1018"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" letter-spacing="3">VAGUSNERV &amp; tVNS</text>
  <text x="300" y="70" text-anchor="middle" fill="#00c4aa" font-family="Inter,Arial,sans-serif" font-size="12" letter-spacing="2" opacity="0.8">TRANSKUTANE VAGUSNERV-STIMULATION</text>

  <!-- ===== HUMAN SILHOUETTE - clear head + shoulders + torso ===== -->
  <!-- Head outline -->
  <ellipse cx="300" cy="155" rx="48" ry="56" fill="none" stroke="#2a3548" stroke-width="2"/>

  <!-- Neck -->
  <rect x="282" y="210" width="36" height="35" fill="none" stroke="#2a3548" stroke-width="2" rx="4"/>

  <!-- Shoulders + Torso -->
  <path d="M282,245 L282,240 Q282,235 270,235 L180,260 Q160,268 158,290 L158,320
           M318,245 L318,240 Q318,235 330,235 L420,260 Q440,268 442,290 L442,320"
        fill="none" stroke="#2a3548" stroke-width="2"/>
  <!-- Torso sides -->
  <path d="M158,320 L158,680 Q158,700 180,710 L210,720
           M442,320 L442,680 Q442,700 420,710 L390,720"
        fill="none" stroke="#2a3548" stroke-width="2"/>
  <!-- Torso bottom -->
  <path d="M210,720 Q300,750 390,720" fill="none" stroke="#2a3548" stroke-width="2"/>

  <!-- Chest line (subtle) -->
  <line x1="300" y1="280" x2="300" y2="320" stroke="#1a2535" stroke-width="1" opacity="0.5"/>

  <!-- ===== BRAIN (simple visible brain in head) ===== -->
  <ellipse cx="300" cy="140" rx="32" ry="28" fill="rgba(0,196,170,0.06)" stroke="#00c4aa" stroke-width="1" opacity="0.5"/>
  <!-- Brain folds -->
  <path d="M278,135 Q290,125 300,135 Q310,125 322,135" fill="none" stroke="#00c4aa" stroke-width="0.8" opacity="0.3"/>
  <path d="M282,145 Q292,138 300,145 Q308,138 318,145" fill="none" stroke="#00c4aa" stroke-width="0.8" opacity="0.3"/>

  <!-- Brainstem dot (origin) -->
  <circle cx="300" cy="175" r="7" fill="#00c4aa" opacity="0.8" filter="url(#glowStrong)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="355" y="179" fill="#00c4aa" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="600">Hirnstamm</text>
  <line x1="307" y1="175" x2="350" y2="177" stroke="#00c4aa" stroke-width="0.8" opacity="0.4"/>

  <!-- ===== tVNS POINT at ear ===== -->
  <!-- Ear shape (left) -->
  <path d="M248,145 Q235,140 232,155 Q230,168 238,178 Q244,185 250,180" fill="none" stroke="#2a3548" stroke-width="2"/>
  <!-- tVNS stimulation point -->
  <circle cx="240" cy="160" r="5" fill="#c9a227" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <!-- Stimulation waves -->
  <circle cx="240" cy="160" r="5" fill="none" stroke="#c9a227" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;15;25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="160" r="5" fill="none" stroke="#c9a227" stroke-width="1" opacity="0">
    <animate attributeName="r" values="5;15;25" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0.7;0.3;0" dur="2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <!-- tVNS label -->
  <rect x="118" y="132" width="90" height="22" rx="11" fill="rgba(201,162,39,0.12)" stroke="#c9a227" stroke-width="0.8"/>
  <text x="163" y="147" text-anchor="middle" fill="#c9a227" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="600" letter-spacing="1">tVNS Punkt</text>
  <line x1="208" y1="148" x2="235" y2="158" stroke="#c9a227" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== VAGUS NERVE - LEFT BRANCH (main) ===== -->
  <path d="M296,182
           L290,220
           L285,260
           L278,310
           C275,340 272,360 270,390
           C268,420 266,450 265,480
           C264,510 263,540 262,570
           C261,600 260,630 260,660"
        fill="none" stroke="#00e6d0" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>

  <!-- ===== VAGUS NERVE - RIGHT BRANCH ===== -->
  <path d="M304,182
           L310,220
           L315,260
           L322,310
           C325,340 328,360 330,390
           C332,420 334,450 335,480
           C336,510 337,540 338,570
           C339,600 340,630 340,660"
        fill="none" stroke="#00e6d0" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>

  <!-- Animated pulse LEFT -->
  <circle r="5" fill="#00ffdd" opacity="0.9" filter="url(#glowStrong)">
    <animateMotion dur="3.5s" repeatCount="indefinite"
      path="M296,182 L290,220 L285,260 L278,310 C275,340 272,360 270,390 C268,420 266,450 265,480 C264,510 263,540 262,570 C261,600 260,630 260,660"/>
  </circle>
  <!-- Animated pulse RIGHT -->
  <circle r="5" fill="#00ffdd" opacity="0.9" filter="url(#glowStrong)">
    <animateMotion dur="3.5s" repeatCount="indefinite" begin="1.7s"
      path="M304,182 L310,220 L315,260 L322,310 C325,340 328,360 330,390 C332,420 334,450 335,480 C336,510 337,540 338,570 C339,600 340,630 340,660"/>
  </circle>

  <!-- ===== ORGAN: LUNGS (both sides) ===== -->
  <!-- Branch to left lung -->
  <path d="M283,290 C260,300 230,310 210,330" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Left lung shape -->
  <ellipse cx="200" cy="360" rx="35" ry="50" fill="rgba(0,196,170,0.04)" stroke="#00c4aa" stroke-width="1.2" opacity="0.6"/>
  <text x="200" y="365" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" opacity="0.9">Lunge</text>

  <!-- Branch to right lung -->
  <path d="M317,290 C340,300 370,310 390,330" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Right lung shape -->
  <ellipse cx="400" cy="360" rx="35" ry="50" fill="rgba(0,196,170,0.04)" stroke="#00c4aa" stroke-width="1.2" opacity="0.6"/>
  <text x="400" y="365" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" opacity="0.9">Lunge</text>

  <!-- ===== ORGAN: HEART (center) ===== -->
  <!-- Branch to heart -->
  <path d="M280,370 C268,380 258,395 255,410" fill="none" stroke="#00c4aa" stroke-width="2" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.7"/>
  <path d="M326,370 C338,380 345,395 345,410" fill="none" stroke="#00c4aa" stroke-width="2" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.7"/>
  <!-- Heart shape -->
  <path d="M300,455 C285,440 255,430 255,410 C255,395 268,388 280,395 C290,400 296,408 300,415
           C304,408 310,400 320,395 C332,388 345,395 345,410 C345,430 315,440 300,455Z"
        fill="rgba(0,196,170,0.08)" stroke="#00c4aa" stroke-width="1.5" opacity="0.8"/>
  <!-- Heart pulse -->
  <circle cx="300" cy="420" r="4" fill="#00e6d0" opacity="0.5">
    <animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="300" y="475" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" opacity="0.95">Herz</text>

  <!-- ===== ORGAN: STOMACH ===== -->
  <!-- Branch to stomach -->
  <path d="M270,480 C258,495 245,515 238,535" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Stomach shape -->
  <path d="M215,540 C215,525 230,518 248,522 C260,525 262,540 255,555 C248,568 230,572 220,562 C212,554 215,545 215,540Z"
        fill="rgba(0,196,170,0.05)" stroke="#00c4aa" stroke-width="1.2" opacity="0.7"/>
  <text x="237" y="590" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" opacity="0.9">Magen</text>

  <!-- ===== ORGAN: LIVER ===== -->
  <!-- Branch to liver -->
  <path d="M330,480 C345,495 360,510 375,525" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Liver shape -->
  <path d="M355,530 C355,518 375,512 395,520 C410,526 415,542 405,555 C395,565 370,562 358,548 C352,542 355,535 355,530Z"
        fill="rgba(0,196,170,0.05)" stroke="#00c4aa" stroke-width="1.2" opacity="0.7"/>
  <text x="383" y="580" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" opacity="0.9">Leber</text>

  <!-- ===== ORGAN: INTESTINES ===== -->
  <!-- Branch to intestines from left -->
  <path d="M264,600 C258,615 252,635 250,650" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Branch from right -->
  <path d="M338,600 C342,615 346,635 348,650" fill="none" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4" filter="url(#glow)" opacity="0.6"/>
  <!-- Intestine shape (simplified coils) -->
  <path d="M265,655 Q280,645 300,650 Q320,655 335,650
           M270,668 Q285,660 300,665 Q315,670 330,665
           M275,681 Q290,675 300,678 Q310,682 325,678"
        fill="none" stroke="#00c4aa" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <text x="300" y="710" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="500" opacity="0.9">Darm</text>

  <!-- ===== LEGEND BOX ===== -->
  <rect x="80" y="760" width="440" height="110" rx="14" fill="rgba(0,196,170,0.04)" stroke="#00c4aa" stroke-width="0.8" opacity="0.7"/>

  <!-- Legend: Vagus nerve -->
  <line x1="110" y1="790" x2="150" y2="790" stroke="#00e6d0" stroke-width="3" stroke-linecap="round"/>
  <text x="165" y="794" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" opacity="0.85">Nervus Vagus (X. Hirnnerv)</text>

  <!-- Legend: Branches -->
  <line x1="110" y1="815" x2="150" y2="815" stroke="#00c4aa" stroke-width="1.8" stroke-dasharray="5,4"/>
  <text x="165" y="819" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" opacity="0.85">Verzweigungen zu Organen</text>

  <!-- Legend: tVNS -->
  <circle cx="130" cy="842" r="6" fill="#c9a227"/>
  <text x="165" y="846" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="12" opacity="0.85">tVNS-Stimulationspunkt (Ohr)</text>

  <!-- Subtitle -->
  <text x="300" y="855" text-anchor="middle" fill="#00c4aa" font-family="Inter,Arial,sans-serif" font-size="10" letter-spacing="1.5" opacity="0.5">NANIL PULSE</text>

</svg>