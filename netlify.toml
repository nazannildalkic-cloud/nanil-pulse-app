[build]
  command = ""
  publish = "public"

# Root → Vorpage (Startseite)
[[redirects]]
  from = "/"
  to = "/vorpage.html"
  status = 302
  force = true

# React App (externe Demo)
[[redirects]]
  from = "/app"
  to = "https://nanil-pulse-app.netlify.app"
  status = 302

[[redirects]]
  from = "/app/*"
  to = "https://nanil-pulse-app.netlify.app/:splat"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
