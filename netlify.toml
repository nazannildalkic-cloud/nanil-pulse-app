[build]
  command = "npx vite build && node -e \"const fs=require('fs');fs.mkdirSync('dist/app',{recursive:true});fs.copyFileSync('dist/index.html','dist/app/index.html');\""
  publish = "dist"

# Blog Proxy -> VPS
[[redirects]]
  from = "/blog/*"
  to = "https://n8n.srv1200351.hstgr.cloud/blog-nanil/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/blog"
  to = "https://n8n.srv1200351.hstgr.cloud/blog-nanil/"
  status = 200
  force = true

[build.environment]
  NODE_VERSION = "18"

# Root → Vorpage (Startseite)
[[redirects]]
  from = "/"
  to = "/vorpage.html"
  status = 302
  force = true

# React App — serve built index.html at /app
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/assets/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"
