[build]
  command = "npm run build"
  publish = "dist"

# Root → Vorpage (Startseite)
[[redirects]]
  from = "/"
  to = "/vorpage.html"
  status = 302
  force = true

# React App
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
